    <style>
        * {

        html,
        body {

            overflow: hidden;
            background: #000;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            display: flex;
            justify-content: center;

        iframe {

                width: 100vw;
                height: calc(100vw * 960 / 640);

                max-width: calc(100vh * 640 / 960);
