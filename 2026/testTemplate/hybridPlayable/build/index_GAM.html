<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hybrid Mock – Democrat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4a0d8f;
      --primary-dark: #2d0858;
      --accent: #7B15EF;
      --accent-light: #b366ff;
      --accent-glow: rgba(123, 21, 239, 0.35);
      --bg: #0c0818;
      --bg-card: #1a0f2e;
      --bg-option: #251643;
      --bg-option-hover: #2e1a52;
      --text: #f0ebf8;
      --text-muted: #9d8ab8;
      --border: rgba(123, 21, 239, 0.2);
      --success: #22c55e;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Default: fill the viewport (correct for narrow-portrait phones,
       where 2/3 would letterbox). Container queries below size all
       internal elements relative to the card, not the viewport. */
    .container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      container-type: size;
      container-name: ad;
    }

    /* Viewport at least as wide as 2/3 (tablets, desktop): lock to a
       portrait 2:3 card instead of stretching horizontally. */
    @media (min-aspect-ratio: 2 / 3) {
      .container {
        aspect-ratio: 2 / 3;
        width: auto;
        height: 100vh;
        height: 100dvh;
      }
    }

    /* ── VIDEO AREA (37%) ── */
    .video-area {
      height: 37%;
      position: relative;
      background: #000;
      overflow: hidden;
      flex-shrink: 0;
    }

    .video-label {
      position: absolute;
      top: clamp(6px, 1.8cqi, 14px);
      left: clamp(6px, 1.8cqi, 14px);
      background: var(--accent);
      color: #fff;
      font-size: clamp(9px, 2.4cqi, 14px);
      font-weight: 600;
      padding: clamp(2px, 0.6cqi, 5px) clamp(6px, 1.8cqi, 12px);
      border-radius: clamp(3px, 1cqi, 6px);
      z-index: 2;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0;
    }

    .vote-now-cta {
      position: absolute;
      bottom: clamp(8px, 2.4cqi, 16px);
      left: 0;
      right: 0;
      text-align: center;
      z-index: 2;
      animation: pulse 2s ease-in-out infinite;
    }

    .vote-now-cta span {
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 255, 255, 0.85);
      font-size: clamp(10px, 2.8cqi, 14px);
      font-weight: 600;
      padding: clamp(4px, 1cqi, 6px) clamp(10px, 3cqi, 18px);
      border-radius: 20px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .video-area video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mute-btn {
      position: absolute;
      top: clamp(8px, 2.4cqi, 14px);
      right: clamp(8px, 2.4cqi, 14px);
      width: clamp(32px, 8cqi, 44px);
      height: clamp(32px, 8cqi, 44px);
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #fff;
      cursor: pointer;
      z-index: 3;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
    }

    .mute-btn:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .mute-btn svg {
      width: clamp(16px, 4cqi, 22px);
      height: clamp(16px, 4cqi, 22px);
      fill: #fff;
    }


    /* ── POLL AREA (63%) ── */
    .poll-area {
      height: 63%;
      display: flex;
      flex-direction: column;
      padding: clamp(10px, 3cqi, 24px) clamp(14px, 5cqi, 44px);
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg) 100%);
      overflow: hidden;
      position: relative;
    }

    .poll-content {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .poll-header {
      text-align: center;
      margin-bottom: clamp(6px, 2cqi, 18px);
      flex-shrink: 0;
    }

    .poll-header h2 {
      font-size: clamp(18px, 5.5cqi, 36px);
      font-weight: 700;
      margin-bottom: clamp(4px, 1cqi, 10px);
      background: linear-gradient(135deg, var(--accent-light), var(--text));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .poll-header p {
      font-size: clamp(12px, 3cqi, 20px);
      color: var(--text-muted);
      line-height: 1.4;
      max-width: 90%;
      margin: 0 auto;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: clamp(9px, 2.2cqi, 14px);
      color: var(--text-muted);
      margin-bottom: clamp(6px, 2cqi, 14px);
      padding: 0 clamp(2px, 0.6cqi, 4px);
      flex-shrink: 0;
    }

    /* Grow to fill remaining height; distribute whitespace between
       options so layout looks intentional on tall portrait phones. */
    .poll-options {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.6cqi, 12px);
      flex: 1;
      justify-content: center;
      min-height: 0;
    }

    .poll-option {
      position: relative;
      display: flex;
      align-items: center;
      gap: clamp(8px, 2cqi, 16px);
      padding: clamp(8px, 2.4cqi, 16px) clamp(12px, 3.2cqi, 22px);
      background: var(--bg-option);
      border: 1.5px solid var(--border);
      border-radius: clamp(8px, 2cqi, 14px);
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .poll-option:hover {
      background: var(--bg-option-hover);
      border-color: rgba(123, 21, 239, 0.35);
    }

    .poll-option.selected {
      background: rgba(123, 21, 239, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 clamp(8px, 2.4cqi, 22px) var(--accent-glow);
    }

    .poll-option .number {
      width: clamp(28px, 7cqi, 44px);
      height: clamp(28px, 7cqi, 44px);
      border-radius: 50%;
      background: rgba(123, 21, 239, 0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: clamp(13px, 3.4cqi, 22px);
      color: var(--accent-light);
      flex-shrink: 0;
      transition: all 0.2s;
      z-index: 1;
    }

    .poll-option.selected .number {
      background: var(--accent);
      color: #fff;
    }

    .poll-option .label {
      font-size: clamp(13px, 3.4cqi, 22px);
      font-weight: 500;
      z-index: 1;
      flex: 1;
    }

    .poll-option .check {
      width: clamp(18px, 4.5cqi, 30px);
      height: clamp(18px, 4.5cqi, 30px);
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
      z-index: 1;
    }

    .poll-option.selected .check {
      opacity: 1;
    }

    .poll-option .result-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      background: rgba(123, 21, 239, 0.12);
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      border-radius: clamp(8px, 2cqi, 14px);
    }

    .poll-option .result-pct {
      font-size: clamp(11px, 2.8cqi, 18px);
      font-weight: 700;
      color: var(--accent-light);
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1;
      flex-shrink: 0;
    }

    .poll-option.voted .result-pct {
      opacity: 1;
    }

    .poll-option.voted {
      cursor: default;
      pointer-events: none;
    }

    /* Submit */
    .submit-btn {
      margin-top: clamp(8px, 2cqi, 16px);
      padding: clamp(12px, 3.2cqi, 22px);
      border: none;
      border-radius: clamp(8px, 2cqi, 14px);
      background: rgba(123, 21, 239, 0.2);
      color: var(--text-muted);
      font-family: inherit;
      font-size: clamp(14px, 3.6cqi, 22px);
      font-weight: 700;
      cursor: not-allowed;
      transition: all 0.3s;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .submit-btn.active {
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 clamp(2px, 0.6cqi, 6px) clamp(12px, 3.2cqi, 30px) var(--accent-glow);
    }

    .submit-btn.active:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    .submit-btn.submitted {
      background: var(--success);
      color: #fff;
      cursor: default;
      pointer-events: none;
    }

    /* Branding */
    .powered-by {
      text-align: center;
      padding-top: clamp(6px, 1.8cqi, 14px);
      font-size: clamp(9px, 2.2cqi, 14px);
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      opacity: 0.5;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- VIDEO 37% -->
    <div class="video-area">
      <div class="video-label">Live Clip</div>
      <video id="video" autoplay muted loop playsinline preload="auto">
        <source src="https://creativehubiion.github.io/advertiser-creatives/2026/testTemplate/hybridPlayable/video.mp4"
          type="video/mp4">
      </video>
      <div class="vote-now-cta"><span>Vote Now &#9660;</span></div>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
        <svg id="muteIcon" viewBox="0 0 24 24">
          <path
            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
        </svg>
        <svg id="unmuteIcon" viewBox="0 0 24 24" style="display:none">
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
      </button>
    </div>

    <!-- POLL 63% -->
    <div class="poll-area">
      <div class="poll-content">
        <div class="poll-header">
          <h2>How Solo Are You?</h2>
          <p>What&rsquo;s your biggest business admin headache right now?</p>
        </div>

        <!-- <div class="scale-labels">
        <span>Strongly Disagree</span>
        <span>Strongly Agree</span>
      </div> -->

        <div class="poll-options" id="pollOptions">
          <div class="poll-option" data-value="1" onclick="selectOption(this)">
            <div class="number">1</div>
            <div class="label">Tracking expenses manually</div>
            <div class="result-pct"></div>
            <div class="check"><svg viewBox="0 0 24 24">
                <polyline points="4,12 10,18 20,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg></div>
            <div class="result-bar"></div>
          </div>
          <div class="poll-option" data-value="2" onclick="selectOption(this)">
            <div class="number">2</div>
            <div class="label">Switching between too many apps</div>
            <div class="result-pct"></div>
            <div class="check"><svg viewBox="0 0 24 24">
                <polyline points="4,12 10,18 20,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg></div>
            <div class="result-bar"></div>
          </div>
          <div class="poll-option" data-value="3" onclick="selectOption(this)">
            <div class="number">3</div>
            <div class="label">Chasing invoices and payments</div>
            <div class="result-pct"></div>
            <div class="check"><svg viewBox="0 0 24 24">
                <polyline points="4,12 10,18 20,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg></div>
            <div class="result-bar"></div>
          </div>
          <div class="poll-option" data-value="4" onclick="selectOption(this)">
            <div class="number">4</div>
            <div class="label">Managing business banking</div>
            <div class="result-pct"></div>
            <div class="check"><svg viewBox="0 0 24 24">
                <polyline points="4,12 10,18 20,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg></div>
            <div class="result-bar"></div>
          </div>
          <div class="poll-option" data-value="5" onclick="selectOption(this)">
            <div class="number">5</div>
            <div class="label">All of the above</div>
            <div class="result-pct"></div>
            <div class="check"><svg viewBox="0 0 24 24">
                <polyline points="4,12 10,18 20,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg></div>
            <div class="result-bar"></div>
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitVote()">Submit Vote</button>
        <div class="powered-by"></div>
      </div>
    </div>

  </div>

  <script>
    const video = document.getElementById('video');
    const muteBtn = document.getElementById('muteBtn');
    const muteIcon = document.getElementById('muteIcon');
    const unmuteIcon = document.getElementById('unmuteIcon');

    // Force muted autoplay across all browsers
    video.muted = true;
    video.setAttribute('muted', '');
    video.setAttribute('playsinline', '');

    function tryAutoplay() {
      var playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(function () {
          // Retry on user interaction as last resort
          document.addEventListener('touchstart', playOnce, { once: true });
          document.addEventListener('click', playOnce, { once: true });
        });
      }
    }

    function playOnce() {
      video.muted = true;
      video.play();
    }

    // Try autoplay immediately, on load, and on visible
    tryAutoplay();
    window.addEventListener('load', tryAutoplay);
    document.addEventListener('DOMContentLoaded', tryAutoplay);

    // Handle tab visibility (browsers pause hidden tabs)
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) {
        video.play();
      }
    });

    // Tracking sink: postMessage to the parent frame (wrapping ad SDK /
    // analytics layer), fire the GAM impression URL via fnfetchAPI, and
    // mirror to console for local dev. Keep payload shape stable —
    // downstream consumers parse it.
    function track(event, data) {
      const payload = { type: 'creative_event', event: event, data: data || {}, ts: Date.now() };
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (e) { /* postMessage to cross-origin parent is fine */ }
      if (window.console) console.log('[creative]', event, payload.data);

      // GAM impression tracker — appends the event name to the templated
      // URL (which the GAM ad server has already substituted with macros
      // like %ebuy!, %epid!, etc. by the time the creative loads).
      if (typeof fnfetchAPI === 'function' && window.trackingType) {
        fnfetchAPI(window.trackingType + encodeURIComponent(event));
      }
    }

    // Single source of truth: icon reflects whether audio is actually
    // audible (not muted AND volume > 0). Driven by `volumechange` so it
    // stays in sync regardless of how the state was changed. Audibility
    // transitions are emitted as tracking events.
    let lastAudible = !video.muted && video.volume > 0;

    function syncMuteIcon() {
      const audible = !video.muted && video.volume > 0;
      muteIcon.style.display = audible ? 'none' : 'block';
      unmuteIcon.style.display = audible ? 'block' : 'none';

      if (audible !== lastAudible) {
        track(audible ? 'audio_audible' : 'audio_inaudible', {
          muted: video.muted,
          volume: video.volume
        });
        lastAudible = audible;
      }
    }

    video.addEventListener('volumechange', syncMuteIcon);
    syncMuteIcon();

    // One-shot: when the video first actually starts playing, record
    // whether audio was audible at that moment. The `playing` event can
    // fire multiple times (after buffering stalls) — we only want the
    // first one.
    let firstPlayTracked = false;
    video.addEventListener('playing', function () {
      if (firstPlayTracked) return;
      firstPlayTracked = true;
      const audible = !video.muted && video.volume > 0;
      track(audible ? 'video_played_audible' : 'video_played_muted', {
        muted: video.muted,
        volume: video.volume
      });
    });

    function toggleMute() {
      const willBeMuted = !video.muted;
      track('mute_button_clicked', { to: willBeMuted ? 'muted' : 'unmuted' });
      video.muted = willBeMuted;
      if (video.volume === 0) video.volume = 1;
    }

    let selectedOption = null;
    const submitBtn = document.getElementById('submitBtn');

    function selectOption(el) {
      if (submitBtn.classList.contains('submitted')) return;
      document.querySelectorAll('.poll-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedOption = el.dataset.value;
      submitBtn.classList.add('active');
      track('poll_option_selected', { option: selectedOption });
      track('poll_answer_' + selectedOption, {});
    }

    function submitVote() {
      if (!selectedOption || submitBtn.classList.contains('submitted')) return;

      track('poll_vote_submitted', { option: selectedOption });
      track('poll_vote_submitted_' + selectedOption, {});

      submitBtn.textContent = 'Thank You!';
      submitBtn.classList.remove('active');
      submitBtn.classList.add('submitted');

      const fakeResults = { 1: 5, 2: 12, 3: 18, 4: 30, 5: 35 };

      document.querySelectorAll('.poll-option').forEach(opt => {
        const val = opt.dataset.value;
        const pct = fakeResults[val];
        opt.querySelector('.result-bar').style.width = pct + '%';
        opt.querySelector('.result-pct').textContent = pct + '%';
        opt.classList.add('voted');
      });
    }

    function fnfetchAPI(trackingURL) {
      fetch(trackingURL, { method: "GET" })
        .then((response) => console.log("Tracking sent:", response.status))
        .catch((error) => console.error("Tracking error:", error));
    }


    //GAM
    window.trackingPath = "assets/";
    window.trackingType =
      "https://staging-dmp-producer.iion.io/tracker/impressions?platform=GAM&campaign_id=%ebuy!&publisher_id=%epid!&creative_id=%ecid!&maid=%%ADVERTISING_IDENTIFIER_PLAIN%%&page_url=%%SITE%%&height=%%HEIGHT%%&width=%%WIDTH%%&video_min_duration=%%VIDEO_DURATION%%&gdpr=${GDPR}&gdpr_consent=${GDPR_CONSENT_XXXX}&demand_id=%eadv!&line_item=%eaid!&event_name=";
    window.setTracker = "%%CLICK_URL_UNESC%%";
    window.landingPageUrl = window.setTracker + "";

  </script>
</body>

</html>
