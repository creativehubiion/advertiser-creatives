<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=640, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <meta name="MobileOptimized" content="640">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="ad.size" content="width=640,height=960">
    <title>Ad Creative 640x960</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 640px;
            height: 960px;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            position: relative;
            background: #ffffff;
        }

        #ad-container {
            width: 640px;
            height: 960px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="ad-container">
        <iframe
            src="https://creativehubiion.github.io/advertiser-creatives/2026/democratharris/index.html"
            width="640"
            height="960"
            frameborder="0"
            scrolling="no"
            style="border: none; display: block;"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>
</body>

</html>
